[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
    "npm install -g @googleworkspace/cli",
    "pip install -r requirements.txt",
    "echo 'Node:' && node --version",
    "echo 'NPX:' && which npx && npx --version",
    "echo 'GWS:' && which gws || echo 'gws not in PATH yet'"
]
