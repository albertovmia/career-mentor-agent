[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
    "npm install -g @googleworkspace/cli",
    "pip install -r requirements.txt",
    "echo '=== PATHS ===' && which npx && which node",
    "echo '=== GWS ===' && which gws || echo 'gws not in PATH at build time'"
]
